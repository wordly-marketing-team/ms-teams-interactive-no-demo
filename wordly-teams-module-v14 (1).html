<!-- ==========================================================================
     WORDLY × TEAMS — INTERACTIVE DEMO MODULE  (v14)
     Paste this entire block into a single Webflow Embed component.
     ========================================================================== -->

<style>
.wordly-demo {
  --wd-blue: #017CFF;
  --wd-blue-soft: #E6EEFF;
  --wd-blue-dark: #015FCC;
  --wd-green: #00D661;
  --wd-meeting-bg: #1A1F2E;
  --wd-meeting-bg-2: #232838;
  --wd-panel: #FFFFFF;
  --wd-bubble: #F1F1F2;
  --wd-text: #1A1A1A;
  --wd-text-muted: #6B6B70;
  --wd-mic-active: #22C55E;
  --wd-hangup: #E03A3A;
  --wd-control-bg: #3a3f4d;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
  color: var(--wd-text);
  position: relative;
}
.wordly-demo *, .wordly-demo *::before, .wordly-demo *::after { box-sizing: border-box; }

.wordly-demo .wd-screen {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(220px, 28%);
  background: var(--wd-meeting-bg);
  border-radius: 12px;
  overflow: hidden;
  aspect-ratio: 16 / 10;
  min-height: 380px;
  position: relative;
  min-width: 0;
  box-shadow: 0 24px 48px -20px rgba(0,0,0,0.35), 0 12px 24px -16px rgba(0,0,0,0.22);
}

.wordly-demo .wd-teams {
  position: relative;
  display: flex;
  flex-direction: column;
  background: radial-gradient(ellipse at top, #232a3d 0%, var(--wd-meeting-bg) 60%);
  user-select: none;
  cursor: pointer;
  min-width: 0;
  overflow: hidden;
}

.wordly-demo .wd-teams-header {
  padding: 14px 16px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.wordly-demo .wd-w-badge {
  width: 32px; height: 32px;
  border-radius: 7px;
  overflow: hidden;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.wordly-demo .wd-w-badge img { width: 100%; height: 100%; display: block; }

.wordly-demo .wd-pause-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  color: #fff;
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.15s;
  padding: 0;
}
.wordly-demo .wd-pause-btn:hover { background: rgba(255,255,255,0.18); }
.wordly-demo .wd-pause-btn svg { width: 11px; height: 11px; fill: #fff; }

.wordly-demo .wd-tiles {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
  padding: 18px 24px 12px;
  align-content: center;
  min-height: 0;
}

.wordly-demo .wd-tile {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  width: 100%;
  height: 100%;
  transition: box-shadow 0.35s, transform 0.35s;
  background: #2a2a2a;
}

.wordly-demo .wd-tile::after {
  content: "";
  position: absolute;
  inset: auto 0 0 0;
  height: 38%;
  background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.55));
  pointer-events: none;
  z-index: 1;
}

.wordly-demo .wd-tile.aliyah { grid-column: 1 / 3; max-width: 60%; justify-self: center; }
.wordly-demo .wd-tile.harjot { grid-column: 1; justify-self: end; max-width: 92%; }
.wordly-demo .wd-tile.miko   { grid-column: 2; justify-self: start; max-width: 92%; }

.wordly-demo .wd-tile-fill { position: absolute; inset: 0; z-index: 0; }
.wordly-demo .wd-tile.aliyah .wd-tile-fill { background: linear-gradient(135deg, #d4a373 0%, #6b4a30 100%); }
.wordly-demo .wd-tile.harjot .wd-tile-fill { background: linear-gradient(135deg, #c8553d 0%, #5e2618 100%); }
.wordly-demo .wd-tile.miko   .wd-tile-fill { background: linear-gradient(135deg, #6b8aa3 0%, #2f4253 100%); }

.wordly-demo .wd-avatar {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
  height: 78%;
  aspect-ratio: 1;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  border: 2px solid rgba(255,255,255,0.28);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 600;
  font-size: clamp(20px, 2.6vw, 38px);
  text-shadow: 0 2px 6px rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 1;
}

.wordly-demo .wd-name-pill {
  position: absolute;
  bottom: 8px; left: 8px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px 4px 7px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 3;
}

.wordly-demo .wd-mic-icon { width: 11px; height: 11px; position: relative; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.wordly-demo .wd-mic-icon svg { width: 100%; height: 100%; }

.wordly-demo .wd-tile.is-active { box-shadow: 0 0 0 2px var(--wd-blue), 0 0 24px rgba(1, 124, 255, 0.5); transform: scale(1.025); }
.wordly-demo .wd-tile.is-active .wd-name-pill { background: var(--wd-blue); }

.wordly-demo .wd-wave { display: none; align-items: flex-end; gap: 1.5px; height: 9px; margin-left: 2px; }
.wordly-demo .wd-tile.is-active .wd-wave { display: inline-flex; }
.wordly-demo .wd-tile.is-active .wd-mic-icon svg { display: none; }
.wordly-demo .wd-wave-bar { width: 1.5px; background: #fff; border-radius: 1px; animation: wd-wave 0.8s ease-in-out infinite; }
.wordly-demo .wd-wave-bar:nth-child(1) { animation-delay: 0s; }
.wordly-demo .wd-wave-bar:nth-child(2) { animation-delay: 0.15s; }
.wordly-demo .wd-wave-bar:nth-child(3) { animation-delay: 0.3s; }
.wordly-demo .wd-wave-bar:nth-child(4) { animation-delay: 0.45s; }
@keyframes wd-wave { 0%, 100% { height: 2px; } 50% { height: 9px; } }

.wordly-demo .wd-controls { display: flex; justify-content: center; align-items: center; gap: 11px; padding: 8px 0 6px; flex-shrink: 0; }
.wordly-demo .wd-ctrl { width: 36px; height: 36px; border-radius: 50%; background: var(--wd-control-bg); display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; }
.wordly-demo .wd-ctrl svg { width: 16px; height: 16px; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; display: block; }
.wordly-demo .wd-ctrl.muted { background: var(--wd-hangup); }
.wordly-demo .wd-ctrl.hangup { background: var(--wd-hangup); }
.wordly-demo .wd-ctrl.hangup svg { transform: rotate(135deg); }

.wordly-demo .wd-meeting-name { text-align: center; font-size: 11px; color: rgba(255,255,255,0.55); padding: 2px 0 12px; letter-spacing: 0.01em; flex-shrink: 0; }

.wordly-demo .wd-panel { background: var(--wd-panel); display: flex; flex-direction: column; border-left: 1px solid #ddd; min-width: 0; min-height: 0; overflow: hidden; }
.wordly-demo .wd-panel-header { padding: 18px 16px 14px; border-bottom: 1px solid #eee; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.wordly-demo .wd-wordly-logo { width: 100%; max-width: 110px; height: auto; display: block; }
.wordly-demo .wd-wordly-sub { font-size: 10px; font-weight: 600; color: #353535; letter-spacing: 0.02em; }

.wordly-demo .wd-lang-wrap { position: relative; margin: 22px 14px 10px; flex-shrink: 0; }
.wordly-demo .wd-lang-select { width: 100%; padding: 8px 30px 8px 11px; font-size: 12.5px; font-family: inherit; color: var(--wd-text); background: #fff; border: 1px solid #d8d8db; border-radius: 4px; appearance: none; -webkit-appearance: none; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
.wordly-demo .wd-lang-select:focus, .wordly-demo .wd-lang-select:hover { border-color: var(--wd-blue); outline: none; box-shadow: 0 0 0 3px rgba(1, 124, 255, 0.12); }
.wordly-demo .wd-lang-wrap::after { content: ""; position: absolute; right: 10px; top: 50%; width: 7px; height: 7px; border-right: 1.5px solid #888; border-bottom: 1.5px solid #888; transform: translateY(-70%) rotate(45deg); pointer-events: none; }
.wordly-demo .wd-lang-select option[value="more"] { font-weight: 600; color: var(--wd-blue); font-style: italic; }

.wordly-demo .wd-lang-hint { position: absolute; top: -18px; left: 0; font-size: 10px; color: var(--wd-blue); font-weight: 500; display: flex; align-items: center; gap: 3px; animation: wd-hint-bob 1.6s ease-in-out infinite; pointer-events: none; }
.wordly-demo .wd-lang-hint.hidden { display: none; }
@keyframes wd-hint-bob { 0%, 100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(-2px); opacity: 0.7; } }


.wordly-demo .wd-feed { flex: 1; overflow-y: auto; padding: 12px 14px 16px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; min-height: 0; }
.wordly-demo .wd-feed::-webkit-scrollbar { width: 4px; }
.wordly-demo .wd-feed::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

.wordly-demo .wd-speaker-group { display: flex; flex-direction: column; gap: 5px; }
.wordly-demo .wd-speaker-name { font-size: 11.5px; font-weight: 600; color: var(--wd-text); margin-top: 4px; }
.wordly-demo .wd-bubble { background: var(--wd-bubble); color: var(--wd-text); font-size: 12px; line-height: 1.45; padding: 8px 11px; border-radius: 11px; max-width: 100%; word-wrap: break-word; animation: wd-bubble-in 0.3s ease-out; }
.wordly-demo .wd-bubble.is-typing { background: #e8efff; }
.wordly-demo .wd-bubble.is-typing::after { content: ""; display: inline-block; width: 5px; height: 11px; background: var(--wd-blue); vertical-align: text-bottom; margin-left: 2px; animation: wd-cursor 0.7s steps(2) infinite; }
@keyframes wd-cursor { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
@keyframes wd-bubble-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.wordly-demo .wd-paused-veil { position: absolute; inset: 0; background: rgba(0,0,0,0.35); display: none; align-items: center; justify-content: center; z-index: 5; pointer-events: none; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
.wordly-demo.is-paused .wd-paused-veil { display: flex; }
.wordly-demo .wd-paused-pill { background: rgba(255,255,255,0.95); color: #1a1a1a; padding: 7px 14px; border-radius: 999px; font-size: 11.5px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }



@media (max-width: 540px) {
  .wordly-demo { padding: 12px; }
  .wordly-demo .wd-screen { grid-template-columns: 1fr; grid-template-rows: auto auto; aspect-ratio: auto; height: auto; min-height: 0; }
  .wordly-demo .wd-teams { aspect-ratio: 16 / 10; }
  .wordly-demo .wd-panel { border-left: none; border-top: 1px solid #ddd; height: 300px; max-height: 300px; }
  .wordly-demo .wd-tiles { padding: 12px 16px 8px; gap: 8px; }
  .wordly-demo .wd-tile.aliyah { max-width: 68%; }
  .wordly-demo .wd-controls { gap: 8px; padding: 4px 0 4px; }
  .wordly-demo .wd-meeting-name { font-size: 9px; padding-bottom: 6px; }
  .wordly-demo .wd-paused-veil { inset: 0; }
}
</style>

          <option value="en">English (US)</option>
          <option value="es">Español</option>
          <option value="ja">Japanese (日本語)</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="pt">Português</option>
          <option value="zh">Chinese (中文)</option>
          <option value="ko">Korean (한국어)</option>
          <option value="more">＋ &amp; dozens more →</option>
        </select>

      </div>

<script>
(function() {
  var SCRIPT_LINES = [
    { speaker: "aliyah", lines: {
      en: "Hi Miko. We are excited to be showing you Wordly with Teams today.",
      es: "Hola Miko. Estamos emocionados de mostrarte Wordly con Teams hoy.",
      ja: "ミコさん、こんにちは。今日はWordlyとTeamsをご紹介できることを嬉しく思います。",
      fr: "Salut Miko. Nous sommes ravis de vous presenter Wordly avec Teams aujourd hui.",
      de: "Hallo Miko. Wir freuen uns, Ihnen heute Wordly mit Teams zu zeigen.",
      pt: "Ola Miko. Estamos animados em mostrar o Wordly com Teams hoje.",
      zh: "你好,Miko。今天我们很高兴向您展示Wordly与Teams的集成。",
      ko: "안녕하세요 미코. 오늘 Wordly와 Teams를 보여드리게 되어 기쁩니다."
    } },
    { speaker: "aliyah", lines: {
      en: "Just pick your preferred language from the menu.",
      es: "Solo elige tu idioma preferido del menu.",
      ja: "メニューからお好みの言語を選んでください。",
      fr: "Choisissez simplement votre langue preferee dans le menu.",
      de: "Wahlen Sie einfach Ihre bevorzugte Sprache aus dem Menu.",
      pt: "Basta escolher seu idioma preferido no menu.",
      zh: "只需从菜单中选择您喜欢的语言。",
      ko: "메뉴에서 원하는 언어를 선택하기만 하면 됩니다."
    } },
    { speaker: "miko", lines: {
      en: "Wow, so I can speak in my own language?",
      es: "Vaya, asi que puedo hablar en mi propio idioma?",
      ja: "すごい、自分の言語で話せるんですか?",
      fr: "Wow, je peux donc parler dans ma propre langue?",
      de: "Wow, ich kann also in meiner eigenen Sprache sprechen?",
      pt: "Uau, entao posso falar no meu proprio idioma?",
      zh: "哇,所以我可以用自己的语言说话?",
      ko: "와, 그럼 제가 제 모국어로 말할 수 있나요?"
    } },
    { speaker: "miko", lines: {
      en: "It will translate for you?",
      es: "Traducira por ti?",
      ja: "あなたのために翻訳してくれるんですか?",
      fr: "Cela traduira pour vous?",
      de: "Es ubersetzt fur Sie?",
      pt: "Vai traduzir para voce?",
      zh: "它会为您翻译?",
      ko: "당신을 위해 번역해 주나요?"
    } },
    { speaker: "miko", lines: {
      en: "And I will get translations too?",
      es: "Y yo tambien recibire traducciones?",
      ja: "私も翻訳をもらえるんですか?",
      fr: "Et je recevrai aussi des traductions?",
      de: "Und ich bekomme auch Ubersetzungen?",
      pt: "E eu tambem receberei traducoes?",
      zh: "我也会得到翻译吗?",
      ko: "저도 번역을 받을 수 있나요?"
    } },
    { speaker: "harjot", lines: {
      en: "Yes, that is right!",
      es: "Si, asi es!",
      ja: "はい、その通りです!",
      fr: "Oui, c est ca!",
      de: "Ja, genau!",
      pt: "Sim, isso mesmo!",
      zh: "是的,没错!",
      ko: "네, 맞아요!"
    } },
    { speaker: "harjot", lines: {
      en: "You can speak and follow along in Japanese and we can speak and follow along in English.",
      es: "Tu puedes hablar y seguir la conversacion en japones y nosotros podemos hablar y seguir en ingles.",
      ja: "あなたは日本語で話して聞いて、私たちは英語で話して聞くことができます。",
      fr: "Vous pouvez parler et suivre en japonais et nous pouvons parler et suivre en anglais.",
      de: "Sie konnen auf Japanisch sprechen und folgen, und wir konnen auf Englisch sprechen und folgen.",
      pt: "Voce pode falar e acompanhar em japones e nos podemos falar e acompanhar em ingles.",
      zh: "您可以用日语说话和跟读,而我们可以用英语说话和跟读。",
      ko: "당신은 일본어로 말하고 따라갈 수 있고 저희는 영어로 말하고 따라갈 수 있습니다."
    } }
  ];

  var SPEAKER_NAMES = { aliyah: "Aliyah", harjot: "Harjot", miko: "Miko" };

  var root = document.getElementById("wordlyDemo");
  var feed = document.getElementById("wdFeed");
  var langSelect = document.getElementById("wdLangSelect");
  var langHint = document.getElementById("wdLangHint");
  var pauseBtn = document.getElementById("wdPauseBtn");
  var teamsClickArea = document.getElementById("wdTeamsClick");
  var tiles = root.querySelectorAll(".wd-tile");


  var currentLang = "en";
  var lineIdx = 0;
  var charIdx = 0;
  var displayedBubbles = [];
  var isPaused = false;
  var timer = null;

  function clearFeed() { feed.innerHTML = ""; displayedBubbles = []; }
  function setActiveSpeaker(s) { tiles.forEach(function(t) { t.classList.toggle("is-active", t.dataset.speaker === s); }); }
  function clearActiveSpeaker() { tiles.forEach(function(t) { t.classList.remove("is-active"); }); }

  function startBubble(idx) {
    var line = SCRIPT_LINES[idx];
    var prev = displayedBubbles[displayedBubbles.length - 1];
    var sameSpeaker = prev && SCRIPT_LINES[prev.lineIdx].speaker === line.speaker;
    var group;
    if (sameSpeaker) {
      group = prev.groupEl;
    } else {
      group = document.createElement("div");
      group.className = "wd-speaker-group";
      var nameEl = document.createElement("div");
      nameEl.className = "wd-speaker-name";
      nameEl.textContent = SPEAKER_NAMES[line.speaker];
      group.appendChild(nameEl);
      feed.appendChild(group);
    }
    var bubbleEl = document.createElement("div");
    bubbleEl.className = "wd-bubble is-typing";
    bubbleEl.textContent = "";
    group.appendChild(bubbleEl);
    displayedBubbles.push({ lineIdx: idx, bubbleEl: bubbleEl, groupEl: group, fullyRendered: false });
    requestAnimationFrame(function() { feed.scrollTop = feed.scrollHeight; });
  }

  function updateTypingBubble(text, isComplete) {
    var last = displayedBubbles[displayedBubbles.length - 1];
    if (!last) return;
    last.bubbleEl.textContent = text;
    if (isComplete) {
      last.bubbleEl.classList.remove("is-typing");
      last.fullyRendered = true;
    }
    feed.scrollTop = feed.scrollHeight;
  }

  function rerenderForLanguage() {
    displayedBubbles.forEach(function(b) {
      var line = SCRIPT_LINES[b.lineIdx];
      var text = line.lines[currentLang] || line.lines.en;
      if (b.fullyRendered) b.bubbleEl.textContent = text;
      else { b.bubbleEl.textContent = ""; charIdx = 0; }
    });
  }

  var CHAR_INTERVAL = 28;
  var PAUSE_BETWEEN_LINES = 700;
  var PAUSE_AFTER_FINAL = 5400;
  var SPEAKER_LEAD_IN = 250;

  function clearTimer() { if (timer) { clearTimeout(timer); timer = null; } }
  function scheduleNextChar() { clearTimer(); if (isPaused) return; timer = setTimeout(typeNextChar, CHAR_INTERVAL); }

  function typeNextChar() {
    if (isPaused) return;
    if (lineIdx < 0 || lineIdx >= SCRIPT_LINES.length) {
      lineIdx = 0;
      charIdx = 0;
      clearFeed();
      clearActiveSpeaker();
    }
    var line = SCRIPT_LINES[lineIdx];
    var text = line.lines[currentLang] || line.lines.en;
    if (charIdx === 0) {
      setActiveSpeaker(line.speaker);
      if (!displayedBubbles.length || displayedBubbles[displayedBubbles.length - 1].lineIdx !== lineIdx) startBubble(lineIdx);
      timer = setTimeout(function() {
        charIdx = 1;
        updateTypingBubble(text.slice(0, 1), false);
        scheduleNextChar();
      }, SPEAKER_LEAD_IN);
      return;
    }
    charIdx++;
    var isComplete = charIdx >= text.length;
    updateTypingBubble(text.slice(0, charIdx), isComplete);
    if (isComplete) {
      timer = setTimeout(function() {
        if (isPaused) return;
        lineIdx++;
        charIdx = 0;
        if (lineIdx >= SCRIPT_LINES.length) {
          clearActiveSpeaker();
          timer = setTimeout(function() {
            if (isPaused) return;
            lineIdx = 0; charIdx = 0;
            clearFeed();
            typeNextChar();
          }, PAUSE_AFTER_FINAL);
        } else { typeNextChar(); }
      }, PAUSE_BETWEEN_LINES);
    } else { scheduleNextChar(); }
  }


  langSelect.addEventListener("change", function(e) {
    var v = e.target.value;
    if (v === "more") {
      e.target.value = currentLang;
      return;
    }
    currentLang = v;
    rerenderForLanguage();
    if (langHint) langHint.classList.add("hidden");
  });

  function togglePause() {
    isPaused = !isPaused;
    root.classList.toggle("is-paused", isPaused);
    var iconEl = document.getElementById("wdPauseIcon");
    if (isPaused) {
      iconEl.innerHTML = '<path d="M3 2 L10 6 L3 10 Z" fill="currentColor"/>';
    } else {
      iconEl.innerHTML = '<rect x="3" y="2" width="2" height="8" fill="currentColor"/><rect x="7" y="2" width="2" height="8" fill="currentColor"/>';
    }
    if (!isPaused) typeNextChar();
    else clearTimer();
  }
  pauseBtn.addEventListener("click", function(e) { e.stopPropagation(); togglePause(); });
  teamsClickArea.addEventListener("click", togglePause);
  langSelect.addEventListener("focus", function() { if (langHint) langHint.classList.add("hidden"); });

  timer = setTimeout(typeNextChar, 600);
})();
</script>
